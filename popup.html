<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 220px;
      padding: 14px;
      margin: 0;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 10px;
    }
    label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      cursor: pointer;
    }
    .hint {
      margin-top: 10px;
      font-size: 11px;
      color: #666;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>Tab Auto-Grouper</h1>
  <label>
    Enabled
    <input type="checkbox" id="toggle" />
  </label>
  <div class="hint">Tabs are grouped by domain automatically once 2+ tabs share the same site.</div>
  <script src="popup.js"></script>
</body>
</html>
